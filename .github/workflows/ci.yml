name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: 后端构建与测试
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: 还原依赖
        run: dotnet restore backend/AssetManagement.sln
      - name: 构建
        run: dotnet build backend/AssetManagement.sln --no-restore -c Release
      - name: 测试
        run: dotnet test backend/tests/AssetManagement.Tests --no-build -c Release

  frontend:
    name: 前端类型检查
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: 安装依赖
        run: pnpm install --frozen-lockfile
      - name: 类型检查
        run: pnpm -F @vben/web-ele run typecheck
